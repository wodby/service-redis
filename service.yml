name: redis
icon: redis
type: datastore
title: Redis
hostname: redis
containers:
- name: redis
  image: wodby/redis
  ports:
  - name: redis
    number: 6379
    type: tcp
  env:
  - name: REDIS_PASSWORD
    value: '{{password}}'
    secret: true    
options:
- version: '7'
scalable: false
labels:
- redis

volumes:
- name: data
  title: Data
  optional: true
  helm: 
    labels: master.persistence.labels  
    values:
    - name: master.persistence.enabled
      value: true
    - name: master.persistence.size
      value: '{{volumes.data.size}}Gi'

tokens:
- name: password
  generate:
    regex: '[0-9a-z-]{32}'

helm:
  name: bitnami
  source: oci://registry-1.docker.io/bitnamicharts/redis
  chart: oci://registry-1.docker.io/bitnamicharts/redis
  version: 19.1.2
  configurations:
  - name: redis
    labels: commonLabels
    annotations: commonAnnotations
    env: master.extraEnvVars
    resources: master.resources
