name: redis
icon: redis
type: datastore
title: Redis
hostname: redis
containers:
- name: redis
  image: wodby/redis
options:
- version: '8.4'
  tag: '8.4'
- version: '8.2'
  tag: '8.2'
- version: '8.0'
  tag: '8.0'
endpoints:
- name: redis
  ports:
  - name: redis
    number: 6379
    type: tcp
labels:
- redis

volumes:
- name: data
  title: Data
  optional: true
  helm: 
    values:
    - name: master.persistence.enabled
      value: true
    - name: master.persistence.size
      value: '{{volumes.data.size}}Gi'
    # mandatory to use existing claim since this volume will have import function
    # we will mount different claim after import and doing it through sts's volumeclaimtemplates is not supported
    - name: primary.persistence.existingClaim
      value: '{{volumes.data.claim}}'

tokens:
- name: password
  generate:
    regex: '[0-9a-z-]{32}'

helm:
  name: wodby
  source: oci://registry-1.docker.io/wodby/redis
  chart: oci://registry-1.docker.io/wodby/redis
  version: 0.1.0
  configurations:
  - name: opensmtpd
    labels: podLabels
    annotations: podAnnotations
    env: envVars
    resources: resources
    volumes: volumes
    mounts: volumeMounts
  values:
  - name: password
    value: '{{password}}'
