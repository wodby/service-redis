name: redis
icon: redis
type: datastore
title: Redis
hostname: redis
containers:
- name: redis
  image: wodby/redis
  ports:
  - name: redis
    number: 6379
    type: tcp
  env:
  - name: REDIS_PASSWORD
    value: '{{password}}'
    secret: true    
options:
- version: '7'
scalable: false
labels:
- redis

volumes:
- name: data
  title: Data
  path: /data
  optional: true

tokens:
- name: password
  generate:
    regex: '[0-9a-z-]{32}'
